<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>結晶対称性パズル — 3Dビューア</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* viewer.html 専用: 2カラムレイアウト */
    #app {
      grid-template-rows: 48px 36px 1fr 36px;
      grid-template-columns: 1fr 280px;
      grid-template-areas:
        "header  header"
        "ctrls   ctrls"
        "viewer  sidebar"
        "footer  footer";
    }
    #controls-bar { grid-area: ctrls; }
  </style>

  <!-- Three.js importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="app">

  <!-- ヘッダー -->
  <header id="header">
    <h1>結晶対称性パズル</h1>
    <span class="sep">|</span>
    <span class="group-label" id="header-group">C₃ᵥ</span>
  </header>

  <!-- コントロールバー -->
  <div id="controls-bar">
    <label>点群:</label>
    <select id="pg-select"></select>
    <label>モード:</label>
    <select id="mode-select">
      <option value="abstract">架空配置</option>
      <option value="real">実在分子</option>
    </select>
    <button id="btn-load">読み込む</button>
    <button id="btn-sym-all">全対称要素を表示</button>
    <button id="btn-sym-none">対称要素を隠す</button>
    <button id="btn-reset-cam">カメラリセット</button>
    <label>速度:</label>
    <select id="speed-select">
      <option value="0.5">遅い</option>
      <option value="1.0" selected>普通</option>
      <option value="2.0">速い</option>
    </select>
  </div>

  <!-- 3D ビューア -->
  <div id="viewer-container">
    <div id="viewer-overlay">ドラッグ: 回転 &nbsp;|&nbsp; スクロール: ズーム</div>
  </div>

  <!-- サイドバー -->
  <aside id="sidebar">

    <div class="sidebar-section">
      <h2>① 分解の進捗</h2>
      <div id="progress-path">
        <span class="path-group current" id="path-start">C₃ᵥ</span>
      </div>
    </div>

    <div class="sidebar-section">
      <h2>② 商群（選択）</h2>
      <div id="quotient-list">
        <div class="loading">点群を選んで読み込んでください</div>
      </div>
      <button class="apply-btn" id="apply-btn" disabled>適用  Enter</button>
    </div>

    <div class="sidebar-section">
      <h2>③ 見つけた組成因子</h2>
      <div id="factors-list"></div>
    </div>

    <div class="sidebar-section">
      <h2>構造情報</h2>
      <div id="struct-info" style="font-size:12px;color:var(--text-dim);line-height:1.8"></div>
    </div>

  </aside>

  <!-- フッター -->
  <footer id="footer">
    <span><kbd>1</kbd>–<kbd>9</kbd> <span class="shortcut">商群を選択</span></span>
    <span><kbd>Enter</kbd> <span class="shortcut">適用</span></span>
    <span><kbd>H</kbd> <span class="shortcut">ヒント</span></span>
    <span><kbd>R</kbd> <span class="shortcut">リセット</span></span>
    <span><kbd>N</kbd> <span class="shortcut">点群選択へ</span></span>
  </footer>

</div>

<script type="module">
import { CrystalViewer } from './js/viewer.js';
import { Sidebar }       from './js/sidebar.js';

const API = 'http://localhost:5000/api';

// ── DOM 参照 ─────────────────────────────────────────────────
const pgSelect    = document.getElementById('pg-select');
const modeSelect  = document.getElementById('mode-select');
const headerGroup = document.getElementById('header-group');
const structInfo  = document.getElementById('struct-info');

// ── Viewer 初期化 ────────────────────────────────────────────
const viewer = new CrystalViewer(document.getElementById('viewer-container'));

// ── Sidebar 初期化 ────────────────────────────────────────────
const sidebar = new Sidebar({
  progressEl:     document.getElementById('progress-path'),
  quotientListEl: document.getElementById('quotient-list'),
  factorsListEl:  document.getElementById('factors-list'),
  applyBtnEl:     document.getElementById('apply-btn'),
  onQuotientSelect: (idx) => {
    // 選択時に対称要素をプレビュー表示
    const q = sidebar.getSelected();
    if (q) viewer.highlightSymmetryByOpTypes(q.op_types ?? []);
  },
  onApply:       () => applySelected(),
  onHoverEnter:  (q) => viewer.highlightSymmetryByOpTypes(q.op_types ?? []),
  onHoverLeave:  ()  => viewer.hideAllSymmetry(),
});

// ── セッション状態 ───────────────────────────────────────────
let sessionId  = null;
let animSpeed  = 1.0;

// ── 点群リスト読み込み ────────────────────────────────────────
async function loadGroupList() {
  try {
    const res    = await fetch(`${API}/groups`);
    const groups = await res.json();
    groups.forEach(g => {
      const opt = document.createElement('option');
      opt.value = g.name;
      opt.textContent = `${g.display_name}  (${g.system}, 位数${g.order})`;
      if (g.name === 'C3v') opt.selected = true;
      pgSelect.appendChild(opt);
    });
    await loadStructureAndSession('C3v', 'abstract');
  } catch (e) {
    showError(`APIサーバーに接続できません: ${e.message}\n` +
              `python3 backend/api.py を起動してください。`);
  }
}

// ── 構造 + セッション読み込み ─────────────────────────────────
async function loadStructureAndSession(pg, mode) {
  headerGroup.textContent = pg;
  viewer.hideAllSymmetry();

  // 構造データ
  try {
    const res    = await fetch(`${API}/structures/${pg}?mode=${mode}`);
    if (!res.ok) throw new Error(await res.text());
    const struct = await res.json();
    viewer.loadStructure(struct);
    updateStructInfo(struct);
  } catch (e) {
    showError('構造データの読み込みに失敗: ' + e.message);
    return;
  }

  // セッション作成
  try {
    if (sessionId) await fetch(`${API}/sessions/${sessionId}`, { method: 'DELETE' });
    const res  = await fetch(`${API}/sessions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ group: pg }),
    });
    const data = await res.json();
    sessionId  = data.session_id;
    sidebar.updateFromSession(data);
    sidebar.setAnimating(false);
  } catch (e) {
    showError('セッション作成に失敗: ' + e.message);
  }
}

// ── 商群の適用 ────────────────────────────────────────────────
async function applySelected() {
  if (viewer.isAnimating) return;
  const q = sidebar.getSelected();
  if (!q || !sessionId) return;

  sidebar.setAnimating(true);

  viewer.playDecompositionAnimation(q.op_types ?? [], async () => {
    try {
      const res  = await fetch(`${API}/sessions/${sessionId}/apply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ normal_subgroup: q.normal_subgroup }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || '適用に失敗'); sidebar.setAnimating(false); return; }

      // サイドバー更新
      sidebar.updateFromSession(data.session);
      sidebar.setAnimating(false);

      // ヘッダー更新
      const curGroup = data.session.current_group?.name ?? data.session.initial_group;
      headerGroup.textContent = curGroup;

      // 次の群の構造を読み込む
      const nextGroup = data.step.to_group;
      const structRes = await fetch(`${API}/structures/${nextGroup}?mode=${modeSelect.value}`);
      if (structRes.ok) {
        const struct = await structRes.json();
        viewer.loadStructure(struct);
        updateStructInfo(struct);
      }
    } catch (e) {
      showError('適用に失敗: ' + e.message);
      sidebar.setAnimating(false);
    }
  }, animSpeed);
}

function updateStructInfo(struct) {
  structInfo.innerHTML = `
    <div>名称: <b>${struct.name || '架空配置'}</b></div>
    <div>式: ${struct.formula || '—'}</div>
    <div>点群: ${struct.point_group}</div>
    <div>モード: ${struct.mode === 'real' ? '実在分子' : '架空配置'}</div>
    <div>原子数: ${struct.atoms.length} / 結合数: ${struct.bonds.length}</div>
    <div>対称要素: ${struct.symmetry_elements.length} 種</div>
  `;
}

// ── キーボード操作 ────────────────────────────────────────────
document.addEventListener('keydown', async e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  const key = e.key;

  if (key >= '1' && key <= '9') {
    sidebar.selectIndex(parseInt(key) - 1);
  } else if (key === 'Enter') {
    await applySelected();
  } else if (key === 'r' || key === 'R') {
    if (!sessionId) return;
    const res  = await fetch(`${API}/sessions/${sessionId}/reset`, { method: 'POST' });
    const data = await res.json();
    await loadStructureAndSession(data.initial_group, modeSelect.value);
  } else if (key === 'h' || key === 'H') {
    sidebar.selectIndex(0);  // ヒント: 最初の商群
  } else if (key === 'n' || key === 'N') {
    pgSelect.focus();
  }
});

// ── ボタン操作 ────────────────────────────────────────────────
document.getElementById('btn-load').addEventListener('click', () =>
  loadStructureAndSession(pgSelect.value, modeSelect.value));
document.getElementById('btn-sym-all').addEventListener('click',   () => viewer.showAllSymmetry());
document.getElementById('btn-sym-none').addEventListener('click',  () => viewer.hideAllSymmetry());
document.getElementById('btn-reset-cam').addEventListener('click', () => viewer.resetCamera());
document.getElementById('speed-select').addEventListener('change', e => {
  animSpeed = parseFloat(e.target.value);
});

// ── エラー表示 ────────────────────────────────────────────────
function showError(msg) {
  structInfo.innerHTML = `<div class="error-msg">${msg.replace(/\n/g,'<br>')}</div>`;
}

// ── 起動 ─────────────────────────────────────────────────────
loadGroupList();
</script>
</body>
</html>
